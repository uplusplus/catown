version: "3.8"

services:
  catown:
    build: .
    container_name: catown
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - HOST=0.0.0.0
      - PORT=8000
      # SQLite (default): data/catown.db
      # PostgreSQL: postgresql://catown:catown@db:5432/catown
      - DATABASE_URL=${DATABASE_URL:-data/catown.db}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-60}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
    volumes:
      - catown-data:/app/backend/data
      - catown-logs:/app/backend/logs
      - ./configs:/app/backend/configs:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL (optional — set DATABASE_URL=postgresql://catown:catown@db:5432/catown to enable)
  db:
    image: postgres:16-alpine
    container_name: catown-db
    environment:
      POSTGRES_USER: catown
      POSTGRES_PASSWORD: catown
      POSTGRES_DB: catown
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catown"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  catown-data:
  catown-logs:
  postgres-data:
