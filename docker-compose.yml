version: "3.8"

services:
  catown:
    build: .
    container_name: catown
    ports:
      - "${PORT:-8000}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      CATOWN_HOME: ${CATOWN_HOME:-/var/lib/catown}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      # Optional overrides:
      # DATABASE_URL: postgresql://catown:catown@db:5432/catown
      # AGENT_CONFIG_FILE: /var/lib/catown/config/agents.json
    volumes:
      - catown-home:/var/lib/catown
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://localhost:8000/health', headers={'X-Catown-Client':'healthcheck'}); urllib.request.urlopen(req)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL (optional — set DATABASE_URL=postgresql://catown:catown@db:5432/catown to enable)
  db:
    image: postgres:16-alpine
    container_name: catown-db
    environment:
      POSTGRES_USER: catown
      POSTGRES_PASSWORD: catown
      POSTGRES_DB: catown
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catown"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  catown-home:
  postgres-data:
