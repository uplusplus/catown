<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catown - Multi-Agent Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0F1115',
                            800: '#16181D',
                            700: '#1E2128',
                            600: '#2A2E35'
                        },
                        accent: {
                            500: '#3B82F6',
                            400: '#60A5FA'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A2E35; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #3B82F6; }
        body { background-color: #0F1115; color: #E5E7EB; }
        .glass-panel { background: rgba(22, 24, 29, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .agent-status-idle { color: #9CA3AF; }
        .agent-status-thinking { color: #FBBF24; animation: pulse 2s infinite; }
        .agent-status-executing { color: #10B981; }
        #sidebar.mobile-hidden { transform: translateX(-100%); }
        @media (min-width: 768px) { #sidebar.mobile-hidden { transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .typing-indicator span { animation: typing 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex font-sans bg-dark-900 text-gray-200">

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 md:relative md:flex flex-col border-r border-dark-700 bg-dark-800 transition-transform duration-300 z-30 mobile-hidden">
        <!-- Logo -->
        <div class="h-16 flex items-center justify-between px-6 border-b border-dark-700">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-400 to-accent-500 flex items-center justify-center text-white font-bold text-xl">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <span class="text-xl font-semibold tracking-wide text-white">Catown</span>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 overflow-y-auto p-4 space-y-6">
            <!-- Search -->
            <div class="relative">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="text" id="search-input" placeholder="Search rooms..." class="w-full bg-dark-900 border border-dark-700 rounded-lg py-2 pl-9 pr-4 text-sm focus:outline-none focus:border-accent-500 text-gray-300 placeholder-gray-500 transition-colors">
            </div>

            <!-- Main Links -->
            <div class="space-y-1">
                <a href="#" onclick="showHome()" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-dark-700 text-white font-medium">
                    <i class="fa-solid fa-house w-5 text-center"></i> Home
                </a>
                <a href="#" onclick="showAgents()" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-colors">
                    <i class="fa-solid fa-compass w-5 text-center"></i> Explore Agents
                </a>
                <a href="#" onclick="showTemplates()" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-colors">
                    <i class="fa-solid fa-book w-5 text-center"></i> Templates
                </a>
            </div>

            <!-- Active Rooms -->
            <div>
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 px-3">Active Rooms</h3>
                <div id="rooms-list" class="space-y-1">
                    <p class="text-xs text-gray-500 px-3 py-2">Loading...</p>
                </div>
            </div>
        </nav>

        <!-- User Profile -->
        <div class="p-4 border-t border-dark-700">
            <div class="flex items-center gap-3 cursor-pointer hover:bg-dark-700 p-2 rounded-lg transition-colors">
                <div class="w-10 h-10 rounded-full border border-dark-600 bg-gradient-to-br from-accent-400 to-purple-500 flex items-center justify-center text-white font-bold">U</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-white truncate">User</p>
                    <p class="text-xs text-gray-500 truncate">Pro Plan</p>
                </div>
                <i class="fa-solid fa-chevron-up text-gray-500 text-xs"></i>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Overlay for background -->
        <div class="absolute inset-0 bg-dark-900/95 z-0"></div>

        <!-- Header -->
        <header id="main-header" class="h-16 flex items-center justify-between px-4 md:px-6 border-b border-dark-700/50 z-10 glass-panel">
            <div class="flex items-center gap-3 md:gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white p-2">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div class="flex items-center gap-2">
                    <h1 id="room-title" class="text-base md:text-lg font-semibold text-white truncate max-w-[120px] md:max-w-none">Catown</h1>
                    <span id="room-badge" class="hidden sm:inline-block px-2 py-0.5 rounded text-xs font-medium bg-dark-700 text-gray-300 border border-dark-600">Multi-Agent</span>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="toggleLogs()" class="hidden sm:block text-gray-400 hover:text-white transition-colors" title="View Logs">
                    <i class="fa-solid fa-terminal"></i>
                </button>
                <button onclick="toggleLogs()" class="lg:hidden text-gray-400 hover:text-white p-2">
                    <i class="fa-solid fa-receipt"></i>
                </button>
                <button onclick="showAddAgent()" class="bg-accent-500 hover:bg-accent-400 text-white px-3 md:px-4 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">Add Agent</span>
                </button>
            </div>
        </header>

        <!-- Chat Area & Side Panel Container -->
        <div class="flex-1 flex overflow-hidden z-10">
            
            <!-- Chat Window -->
            <div id="chat-container" class="flex-1 flex flex-col relative w-full">
                
                <!-- Agent Status Bar -->
                <div id="agent-status-bar" class="px-4 md:px-6 py-3 border-b border-dark-700/50 flex gap-3 md:gap-4 overflow-x-auto glass-panel no-scrollbar">
                    <p class="text-xs text-gray-500">Loading agents...</p>
                </div>

                <!-- Messages Area -->
                <div id="messages-area" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                    <!-- Intro Message -->
                    <div class="text-center py-6 md:py-8">
                        <div class="w-16 h-16 md:w-20 md:h-20 mx-auto rounded-full bg-gradient-to-tr from-purple-500 via-accent-500 to-emerald-500 p-1 mb-4 shadow-lg shadow-accent-500/20">
                            <div class="w-full h-full bg-dark-900 rounded-full flex items-center justify-center">
                                <i class="fa-solid fa-robot text-3xl text-white"></i>
                            </div>
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-white mb-2">Welcome to Catown</h2>
                        <p class="text-sm md:text-base text-gray-400 max-w-md mx-auto px-4">Multi-Agent Collaboration Platform - Loading...</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-4 bg-dark-900/80 border-t border-dark-700/50 backdrop-blur-md">
                    <div class="max-w-4xl mx-auto">
                        <!-- Command Hints -->
                        <div class="flex gap-2 mb-2 px-2 flex-wrap">
                            <button onclick="insertAt()" class="text-xs bg-dark-700 hover:bg-dark-600 text-gray-300 px-2 py-1 rounded border border-dark-600 transition-colors">
                                <i class="fa-solid fa-at text-gray-400 mr-1"></i> Mention Agent
                            </button>
                            <button onclick="insertCreateRoom()" class="text-xs bg-dark-700 hover:bg-dark-600 text-gray-300 px-2 py-1 rounded border border-dark-600 transition-colors">
                                <i class="fa-solid fa-plus text-gray-400 mr-1"></i> Create Room
                            </button>
                            <button onclick="runScript()" class="text-xs bg-dark-700 hover:bg-dark-600 text-gray-300 px-2 py-1 rounded border border-dark-600 transition-colors">
                                <i class="fa-solid fa-terminal text-gray-400 mr-1"></i> Run Script
                            </button>
                        </div>
                        
                        <!-- Input Box -->
                        <div class="relative flex items-end gap-2 bg-dark-800 border border-dark-600 rounded-xl p-2 shadow-lg focus-within:border-accent-500 focus-within:ring-1 focus-within:ring-accent-500 transition-all">
                            <button class="p-2 text-gray-400 hover:text-white transition-colors rounded-lg hover:bg-dark-700">
                                <i class="fa-solid fa-paperclip"></i>
                            </button>
                            <textarea id="message-input" rows="1" class="w-full bg-transparent text-gray-200 placeholder-gray-500 resize-none outline-none py-2 max-h-32" placeholder="Message room or @agent... Try 'Create a new room for SEO analysis'"></textarea>
                            <div class="flex gap-1">
                                <button class="p-2 text-gray-400 hover:text-white transition-colors rounded-lg hover:bg-dark-700">
                                    <i class="fa-solid fa-microphone"></i>
                                </button>
                                <button onclick="sendMessage()" class="p-2 bg-accent-500 hover:bg-accent-400 text-white transition-colors rounded-lg shadow-md">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Side Panel (Logs & Config) -->
            <div id="side-panel" class="w-80 border-l border-dark-700/50 bg-dark-900/95 backdrop-blur-xl flex flex-col hidden lg:flex">
                <!-- Panel Tabs -->
                <div class="flex border-b border-dark-700">
                    <button id="tab-logs" onclick="switchTab('logs')" class="flex-1 py-3 text-sm font-medium text-white border-b-2 border-accent-500 bg-dark-800/50">
                        <i class="fa-solid fa-terminal mr-2"></i>Logs
                    </button>
                    <button id="tab-config" onclick="switchTab('config')" class="flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white hover:bg-dark-800/30 transition-colors">
                        <i class="fa-solid fa-sliders mr-2"></i>Config
                    </button>
                </div>

                <!-- Log Content -->
                <div id="logs-content" class="flex-1 overflow-y-auto p-4 font-mono text-xs space-y-2">
                    <div class="text-gray-500">System initializing...</div>
                </div>

                <!-- Config Content (hidden by default) -->
                <div id="config-content" class="flex-1 overflow-y-auto p-4 hidden">
                    <h4 class="text-sm font-semibold text-white mb-4">Agent Configuration</h4>
                    <div id="config-agents" class="space-y-3">
                        <!-- Agent configs will be populated here -->
                    </div>
                </div>

                <!-- System Status -->
                <div class="p-4 border-t border-dark-700 bg-dark-800/50">
                    <h4 class="text-xs font-semibold text-gray-400 uppercase mb-3">System Status</h4>
                    <div class="space-y-3">
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span class="text-gray-300">Active Agents</span>
                                <span id="agents-count" class="text-gray-400">0 / 0</span>
                            </div>
                            <div class="h-1.5 w-full bg-dark-700 rounded-full overflow-hidden">
                                <div id="agents-progress" class="h-full bg-blue-500 w-0 rounded-full transition-all"></div>
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-gray-300">Backend Status</span>
                            <span id="backend-status" class="text-gray-500 flex items-center gap-1">
                                <i class="fa-solid fa-circle text-[8px]"></i> Connecting...
                            </span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:8000/api';
        
        // State
        let projects = [];
        let agents = [];
        let currentProject = null;
        let messages = [];
        let ws = null;
        let logs = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            addLog('System initializing...', 'gray');
            addLog(`System initialized at ${new Date().toLocaleTimeString()} UTC`, 'gray');
            
            // Load data
            await Promise.all([loadProjects(), loadAgents()]);
            
            // Connect WebSocket
            connectWebSocket();
            
            // Select first project if available
            if (projects.length > 0) {
                selectProject(projects[0]);
            }
        });

        // API Functions
        async function loadProjects() {
            try {
                const res = await fetch(`${API_BASE}/projects`);
                projects = await res.json();
                renderRooms();
                addLog(`[API] Loaded ${projects.length} projects`, 'blue');
            } catch (e) {
                addLog('[API] Failed to load projects', 'red');
                console.error(e);
            }
        }

        async function loadAgents() {
            try {
                const res = await fetch(`${API_BASE}/agents`);
                agents = await res.json();
                renderAgents();
                addLog(`[API] Loaded ${agents.length} agents`, 'blue');
                agents.forEach(a => addLog(`[Agent:${a.name}] Ready`, 'green'));
            } catch (e) {
                addLog('[API] Failed to load agents', 'red');
                console.error(e);
            }
        }

        async function loadMessages(chatroomId) {
            try {
                const res = await fetch(`${API_BASE}/chatrooms/${chatroomId}/messages`);
                messages = await res.json();
                renderMessages();
            } catch (e) {
                console.error(e);
            }
        }

        async function createProject(name) {
            try {
                const res = await fetch(`${API_BASE}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: '' })
                });
                const project = await res.json();
                projects.push(project);
                renderRooms();
                selectProject(project);
                addLog(`[Room] ${name} created`, 'blue');
                return project;
            } catch (e) {
                addLog('[API] Failed to create project', 'red');
                console.error(e);
            }
        }

        async function sendUserMessage(content) {
            if (!currentProject?.chatroom_id) return;
            try {
                const res = await fetch(`${API_BASE}/chatrooms/${currentProject.chatroom_id}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, message_type: 'user' })
                });
                const msg = await res.json();
                messages.push(msg);
                renderMessages();
                addLog('[API] Message sent 200 OK', 'green');
                
                // Poll for agent response after a delay
                setTimeout(async () => {
                    await loadMessages(currentProject.chatroom_id);
                }, 3000);
            } catch (e) {
                addLog('[API] Failed to send message', 'red');
                console.error(e);
            }
        }

        // WebSocket
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8000/ws');
            
            ws.onopen = () => {
                updateBackendStatus('connected');
                addLog('[WS] Connected to server', 'green');
            };
            
            ws.onclose = () => {
                updateBackendStatus('disconnected');
                addLog('[WS] Disconnected from server', 'yellow');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (e) => {
                addLog('[WS] Connection error', 'red');
            };
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleWebSocketMessage(data);
            };
        }

        function handleWebSocketMessage(data) {
            if (data.type === 'message') {
                messages.push(data);
                renderMessages();
            } else if (data.type === 'agent_status') {
                updateAgentStatus(data.agent_name, data.status);
            }
        }

        // Render Functions
        function renderRooms() {
            const container = document.getElementById('rooms-list');
            if (projects.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-500 px-3 py-2">No rooms yet. Create one!</p>';
                return;
            }
            container.innerHTML = projects.map(p => {
                const isActive = currentProject?.id === p.id;
                const agentCount = p.agents?.length || 1;
                return `
                    <a href="#" onclick="event.preventDefault(); selectProject(projects.find(x => x.id === ${p.id}))" 
                       class="flex items-center justify-between px-3 py-2 rounded-lg ${isActive ? 'bg-dark-700 text-gray-300' : 'text-gray-400 hover:bg-dark-700 hover:text-gray-300 transition-colors'} group">
                        <div class="flex items-center gap-3 truncate">
                            <span class="w-2 h-2 rounded-full ${isActive ? 'bg-green-500' : 'bg-gray-500'}"></span>
                            <span class="truncate text-sm">${escapeHtml(p.name)}</span>
                        </div>
                        <span class="text-xs ${isActive ? 'bg-dark-600' : 'bg-dark-800 group-hover:bg-dark-600'} px-1.5 py-0.5 rounded text-gray-400">${agentCount} AI</span>
                    </a>
                `;
            }).join('');
        }

        function renderAgents() {
            const container = document.getElementById('agent-status-bar');
            const activeAgents = agents.filter(a => a.is_active);
            if (activeAgents.length === 0) {
                container.innerHTML = '<p class="text-xs text-gray-500">No active agents</p>';
                return;
            }
            container.innerHTML = activeAgents.map(a => `
                <div class="flex-shrink-0 flex items-center gap-2 bg-dark-800/80 px-3 py-1.5 rounded-full border border-dark-600">
                    <div class="relative">
                        <div class="w-6 h-6 rounded-full bg-gradient-to-br from-accent-400 to-purple-500 flex items-center justify-center text-white text-xs font-bold">
                            ${a.name.charAt(0).toUpperCase()}
                        </div>
                        <span class="absolute -bottom-1 -right-1 w-3 h-3 bg-dark-800 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-moon text-[8px] agent-status-idle"></i>
                        </span>
                    </div>
                    <span class="text-sm font-medium text-gray-300">${escapeHtml(a.name)}</span>
                    <span class="text-xs text-gray-500 border-l border-dark-600 pl-2">Idle</span>
                </div>
            `).join('');
            
            // Update status
            document.getElementById('agents-count').textContent = `${activeAgents.length} / ${agents.length}`;
            document.getElementById('agents-progress').style.width = `${(activeAgents.length / Math.max(agents.length, 1)) * 100}%`;
        }

        function renderMessages() {
            const container = document.getElementById('messages-area');
            let html = `
                <div class="text-center py-6 md:py-8">
                    <div class="w-16 h-16 md:w-20 md:h-20 mx-auto rounded-full bg-gradient-to-tr from-purple-500 via-accent-500 to-emerald-500 p-1 mb-4 shadow-lg shadow-accent-500/20">
                        <div class="w-full h-full bg-dark-900 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-robot text-3xl text-white"></i>
                        </div>
                    </div>
                    <h2 class="text-xl md:text-2xl font-bold text-white mb-2">${currentProject ? escapeHtml(currentProject.name) + ' Initialized' : 'Welcome to Catown'}</h2>
                    <p class="text-sm md:text-base text-gray-400 max-w-md mx-auto px-4">${currentProject ? `I've assembled ${agents.filter(a => a.is_active).map(a => a.name).join(', ')}. What are we working on?` : 'Select or create a room to begin'}</p>
                </div>
            `;
            
            messages.forEach(m => {
                if (m.message_type === 'user' || !m.agent_name) {
                    html += `
                        <div class="flex gap-3 md:gap-4 justify-end">
                            <div class="bg-accent-600 text-white px-4 md:px-5 py-2 md:py-3 rounded-2xl rounded-tr-sm max-w-[85%] md:max-w-[80%] shadow-md text-sm md:text-base">
                                <p>${escapeHtml(m.content)}</p>
                            </div>
                            <div class="w-8 h-8 rounded-full mt-auto bg-gradient-to-br from-accent-400 to-purple-500 flex items-center justify-center text-white font-bold text-sm">U</div>
                        </div>
                    `;
                } else {
                    const agent = agents.find(a => a.name === m.agent_name);
                    const color = getAgentColor(m.agent_name);
                    html += `
                        <div class="flex gap-4">
                            <div class="relative mt-auto">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-${color}-400 to-${color}-500 flex items-center justify-center text-white text-xs font-bold">
                                    ${m.agent_name.charAt(0).toUpperCase()}
                                </div>
                            </div>
                            <div class="bg-dark-700/80 border border-dark-600 text-gray-200 px-5 py-4 rounded-2xl rounded-tl-sm max-w-[80%] shadow-md">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="font-semibold text-sm text-${color}-400">${escapeHtml(m.agent_name)}</span>
                                    <span class="text-xs text-gray-500">${formatTime(m.created_at)}</span>
                                </div>
                                <p>${escapeHtml(m.content)}</p>
                            </div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function renderConfig() {
            const container = document.getElementById('config-agents');
            container.innerHTML = agents.map(a => `
                <div class="p-3 bg-dark-800 rounded-lg border border-dark-600">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-medium text-white">${escapeHtml(a.name)}</span>
                        <span class="text-xs ${a.is_active ? 'text-green-400' : 'text-gray-500'}">${a.is_active ? 'Active' : 'Inactive'}</span>
                    </div>
                    <p class="text-xs text-gray-400">${escapeHtml(a.role || 'No role defined')}</p>
                </div>
            `).join('');
        }

        // UI Functions
        function selectProject(project) {
            currentProject = project;
            document.getElementById('room-title').textContent = project.name;
            renderRooms();
            renderMessages();
            if (project.chatroom_id) {
                loadMessages(project.chatroom_id);
                if (ws?.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'join', chatroom_id: project.chatroom_id }));
                }
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('mobile-hidden');
        }

        function toggleLogs() {
            document.getElementById('side-panel').classList.toggle('hidden');
        }

        function switchTab(tab) {
            const logsTab = document.getElementById('tab-logs');
            const configTab = document.getElementById('tab-config');
            const logsContent = document.getElementById('logs-content');
            const configContent = document.getElementById('config-content');
            
            if (tab === 'logs') {
                logsTab.className = 'flex-1 py-3 text-sm font-medium text-white border-b-2 border-accent-500 bg-dark-800/50';
                configTab.className = 'flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white hover:bg-dark-800/30 transition-colors';
                logsContent.classList.remove('hidden');
                configContent.classList.add('hidden');
            } else {
                configTab.className = 'flex-1 py-3 text-sm font-medium text-white border-b-2 border-accent-500 bg-dark-800/50';
                logsTab.className = 'flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white hover:bg-dark-800/30 transition-colors';
                configContent.classList.remove('hidden');
                logsContent.classList.add('hidden');
                renderConfig();
            }
        }

        function addLog(message, color = 'gray') {
            const container = document.getElementById('logs-content');
            const colorClass = {
                'gray': 'text-gray-500',
                'blue': 'text-blue-400',
                'green': 'text-green-400',
                'red': 'text-red-400',
                'yellow': 'text-yellow-400'
            }[color] || 'text-gray-500';
            
            const div = document.createElement('div');
            div.className = colorClass;
            div.textContent = message;
            container.appendChild(div);
            
            // Keep only last 100 logs
            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
            container.scrollTop = container.scrollHeight;
        }

        function updateBackendStatus(status) {
            const el = document.getElementById('backend-status');
            if (status === 'connected') {
                el.innerHTML = '<i class="fa-solid fa-circle text-[8px] text-green-400"></i> Connected';
                el.className = 'text-green-400 flex items-center gap-1';
            } else {
                el.innerHTML = '<i class="fa-solid fa-circle text-[8px]"></i> Disconnected';
                el.className = 'text-red-400 flex items-center gap-1';
            }
        }

        function updateAgentStatus(agentName, status) {
            // TODO: Update agent status in UI
        }

        // Message Actions
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;
            
            input.value = '';
            
            // Check for commands
            if (content.startsWith('创建项目：') || content.startsWith('Create room:') || content.startsWith('create room:')) {
                const name = content.replace(/^(创建项目：|Create room:|create room:)\s*/, '');
                await createProject(name);
                return;
            }
            
            if (!currentProject) {
                addLog('[Error] Please select or create a room first', 'red');
                return;
            }
            
            await sendUserMessage(content);
        }

        function insertAt() {
            const input = document.getElementById('message-input');
            input.value += '@';
            input.focus();
        }

        function insertCreateRoom() {
            const input = document.getElementById('message-input');
            input.value = '创建项目：';
            input.focus();
        }

        function runScript() {
            addLog('[Script] No script to run', 'yellow');
        }

        // Placeholder functions
        function showHome() {
            addLog('[Nav] Home', 'blue');
        }

        function showAgents() {
            addLog('[Nav] Explore Agents', 'blue');
        }

        function showTemplates() {
            addLog('[Nav] Templates', 'blue');
        }

        function showAddAgent() {
            addLog('[Action] Add Agent dialog', 'blue');
        }

        // Utility Functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(dateStr) {
            if (!dateStr) return 'Just now';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = (now - date) / 1000;
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff / 60)} mins ago`;
            return date.toLocaleTimeString();
        }

        function getAgentColor(name) {
            const colors = ['purple', 'emerald', 'amber', 'rose', 'cyan', 'indigo'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && document.activeElement.id === 'message-input') {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
